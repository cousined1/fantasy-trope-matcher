<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Discover your fantasy romance tropes and find your perfect book match. Take the quiz and share your results with friends!">
  <meta property="og:title" content="Fantasy Trope Matcher — Which Story Was Written For You?">
  <meta property="og:description" content="Are you enemies-to-lovers? Chosen one? Take the quiz and get matched to your next obsession.">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d4a843;
      --dark: #0d0d1a;
      --card-bg: #13132a;
      --accent: #8b6fc2;
      --accent2: #c96090;
      --text: #e8e0f0;
      --muted: #9090b0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(139,111,194,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,96,144,0.10) 0%, transparent 60%);
    }
    #app {
      max-width: 660px;
      width: 100%;
    }
    .hero {
      text-align: center;
      padding: 40px 20px;
    }
    .hero h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--gold);
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .hero p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 24px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 16px 44px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(139,111,194,0.4);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,111,194,0.5); }

    /* QUIZ */
    .quiz-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 36px 32px;
      border: 1px solid rgba(212,168,67,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .progress-bar {
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--gold));
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .q-num {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .q-text {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      color: var(--gold);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .option-btn:hover {
      background: rgba(139,111,194,0.2);
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .option-btn.selected {
      background: rgba(139,111,194,0.3);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* EMAIL GATE */
    .email-gate {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 40px 32px;
      border: 1px solid rgba(212,168,67,0.2);
      text-align: center;
    }
    .email-gate h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1.6rem;
      margin-bottom: 12px;
    }
    .email-gate p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .email-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
    }
    .email-input:focus { border-color: var(--accent); }
    .btn-reveal {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #b8893a);
      color: #0d0d1a;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-reveal:hover { transform: translateY(-2px); }
    .skip-link {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;

    /* RESULTS */

      margin-bottom: 16px;
    }
    .result-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--gold);

      line-height: 1.3;
    }
    .result-subtitle {
      color: var(--accent);
      font-size: 1rem;
      margin-bottom: 20px;
      font-style: italic;
    }
    .trope-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .trope-pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .result-desc {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }
    .kdp-cta {
      background: linear-gradient(135deg, rgba(212,168,67,0.1), rgba(201,96,144,0.1));
      border: 1px solid rgba(212,168,67,0.3);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .kdp-cta p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .kdp-cta strong { color: var(--gold); }
    .btn-amazon {
      display: inline-block;
      background: linear-gradient(135deg, #f90, #e47911);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s;
      margin: 4px;
    }
    .btn-amazon:hover { transform: translateY(-2px); }
    .share-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .share-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .share-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .share-btn:hover { transform: translateY(-2px); }
    .share-tiktok { background: #010101; color: #fff; }
    .share-twitter { background: #1da1f2; color: #fff; }
    .share-ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }
    .share-copy { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid rgba(255,255,255,0.2); }
    .btn-retry {
      margin-top: 20px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--muted);
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-retry:hover { border-color: var(--accent); color: var(--text); }
    .sparkles { font-size: 2rem; margin-bottom: 12px; }
    .copy-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card-bg);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .copy-toast.show { transform: translateX(-50%) translateY(0); }
    @media (max-width: 480px) {
      .quiz-card, .email-gate, .results-card { padding: 24px 18px; }
    }
  </style>
</head>

    const RESULTS = {

        label: "Enemies-to-Lovers",

        desc: "You don't fall gently — you collide. The tension is everything. You live for the moment hatred flips, the breath that shifts between a glare and a kiss. Your matches spar with wit, bleed the same way, and can't escape the gravity between them.",

        bookDesc: "Imani knows what it's like to stand against someone who challenges every belief — and still feel the pull. Her story is your story.",
        amazonUrl: "https://www.amazon.com/author/edwardbrooks",
        color: "#c96090"
      },
      "chosen-one": {
        label: "The Chosen One",
        emoji: "✨",
        desc: "You believe in destiny — not as a comfort, but as a weight. You were marked for something before you had a choice. Your story isn't about finding power. It's about surviving what power costs.",
        book: "amara",
        bookTitle: "Amara: The Enchantress",
        bookDesc: "Amara was chosen by forces older than kingdoms. The magic chose her. Now she must decide if she accepts the throne or burns it down.",

        label: "Warrior Queen",

        desc: "You don't wait to be rescued. You are the rescue. Power isn't something handed to you — it's something you took, built, and will defend with everything you have. Your love story is between equals who've both bled for what they believe in.",

    let currentQ = 0;
    let scores = {};
    let emailCaptured = false;

    function init() {
      renderHero();
    }

    function renderHero() {
      document.getElementById('app').innerHTML = `
        <div class="hero">
          <div class="sparkles">✨📚⚔️</div>
          <h1>Fantasy Trope Matcher</h1>
          <p>Which romance tropes are written into your soul? Take the quiz, discover your signature tropes, and find the fantasy series that was made for you.</p>
          <button class="btn-start" onclick="startQuiz()">Reveal My Tropes →</button>
          <p style="margin-top:16px; font-size:0.8rem; color:var(--muted)">8 questions · 2 minutes · Shareable results</p>
        </div>
      `;
    }

    function startQuiz() {
      currentQ = 0;
      scores = {};
      renderQuestion();
    }

    function renderQuestion() {
      const q = QUESTIONS[currentQ];
      const progress = ((currentQ) / QUESTIONS.length) * 100;
      document.getElementById('app').innerHTML = `
        <div class="quiz-card">
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="q-num">Question ${currentQ + 1} of ${QUESTIONS.length}</div>
          <div class="q-text">${q.text}</div>
          <div class="options">
            ${q.options.map((o, i) => `
              <button class="option-btn" onclick="selectOption(${i})">${o.text}</button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function selectOption(idx) {
      const q = QUESTIONS[currentQ];
      const option = q.options[idx];
      option.tropes.forEach(t => { scores[t] = (scores[t] || 0) + 1; });

      // brief visual feedback
      const btns = document.querySelectorAll('.option-btn');
      btns[idx].classList.add('selected');

      setTimeout(() => {
        currentQ++;
        if (currentQ < QUESTIONS.length) {
          renderQuestion();
        } else if (!emailCaptured) {
          renderEmailGate();
        } else {
          renderResults();
        }
      }, 350);
    }

    function renderEmailGate() {
      document.getElementById('app').innerHTML = `
        <div class="email-gate">
          <div class="sparkles">🔮</div>
          <h2>Your Tropes Are Ready</h2>
          <p>Drop your email to unlock your full trope profile + a free chapter from your matched series.</p>
          <input type="email" class="email-input" id="emailInput" placeholder="your@email.com">
          <label style="display:block; margin:8px 0 12px; font-size:0.85rem; color:var(--muted); text-align:left;">
            <input type="checkbox" id="consentCheckbox">
            I agree to data processing for quiz results and marketing updates.
          </label>
          <button class="btn-reveal" onclick="submitEmail()">Reveal My Match →</button>
          <span class="skip-link" onclick="skipEmail()">Skip for now</span>
        </div>
      `;
    }

    async function submitEmail() {
      const email = document.getElementById('emailInput').value;
      const consent = document.getElementById('consentCheckbox')?.checked;
      if (!consent) return;
      if (email && email.includes('@')) {
        const topTropes = getTopTropes();
        // POST to n8n webhook for KDP marketing list
        const payload = {
          email: email,
          topTropes: topTropes,
          result: topTropes[0],
          timestamp: new Date().toISOString(),
          source: 'fantasy-trope-matcher',
          consent: true,
          consentTimestamp: new Date().toISOString()
        };
        try {
          const res = await fetch('https://embrooks.org/webhook/trope-matcher-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error(`Webhook failed: ${res.status}`);
          emailCaptured = true;
        } catch (err) {
          console.error('Email webhook error:', err);
        }
      }
      renderResults();
    }

    function skipEmail() {
      emailCaptured = true;
      renderResults();
    }

    function getTopTropes() {
      return Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([trope]) => trope);
    }

    function renderResults() {
      const topTropes = getTopTropes();
      const primary = topTropes[0];
      const result = RESULTS[primary] || RESULTS["chosen-one"];

      const tropeLabels = topTropes.map(t => RESULTS[t]?.label || t);
      const shareText = `I'm "${result.label}" energy ✨ My top fantasy romance tropes: ${tropeLabels.join(' · ')} — Take the trope quiz:`;
      const shareUrl = 'https://edwardbrooks-trope-matcher.netlify.app';

      document.getElementById('app').innerHTML = `
        <div class="results-card">
          <div class="sparkles">${result.emoji}</div>
          <div class="result-badge" style="background: linear-gradient(135deg, ${result.color}88, ${result.color})">Your Primary Trope</div>
          <div class="result-title">${result.label}</div>
          <div class="result-subtitle">You're also: ${tropeLabels.slice(1).join(' & ')}</div>
          <div class="trope-pills">
            ${tropeLabels.map(l => `<span class="trope-pill">${l}</span>`).join('')}
          </div>
          <div class="result-desc">${result.desc}</div>
          <div class="kdp-cta">
            <p>✨ <strong>Your perfect match:</strong> ${result.bookTitle}</p>
            <p>${result.bookDesc}</p>
            <a href="${result.amazonUrl}" target="_blank" rel="noopener" class="btn-amazon">📖 Read on Amazon</a>
          </div>
          <div class="share-section">
            <h3>Challenge your BookTok friends 👇</h3>
            <div class="share-btns">
              <button class="share-btn share-tiktok" onclick="shareTikTok('${encodeURIComponent(shareText + ' ' + shareUrl)}')">🎵 TikTok</button>
              <button class="share-btn share-twitter" onclick="shareTwitter('${encodeURIComponent(shareText)}', '${encodeURIComponent(shareUrl)}')">🐦 Twitter</button>
              <button class="share-btn share-copy" onclick="copyResult('${encodeURIComponent(shareText + ' ' + shareUrl)}')">📋 Copy</button>
            </div>
          </div>
          <button class="btn-retry" onclick="startQuiz()">Retake Quiz</button>
        </div>
      `;
    }

    function shareTikTok(text) {
      // TikTok doesn't have web share API — copy to clipboard and open TikTok
      copyToClipboard(decodeURIComponent(text));
      window.open('https://www.tiktok.com', '_blank');
    }

    function shareTwitter(text, url) {
      window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank', 'width=600,height=400');
    }

    function copyResult(text) {
      copyToClipboard(decodeURIComponent(text));
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('copyToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      });
    }

    init();
  </script>
</body>
</html>
